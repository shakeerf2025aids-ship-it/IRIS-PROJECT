version: '3.8'

services:
  iris-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_WORKERS: 2
      CORS_ORIGINS: "http://localhost:8000,http://127.0.0.1:8000,http://10.0.2.2:8000"
      MODEL_PATH: ml/models/best_model_epoch4.pth
      DEVICE: auto
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      AUTH_ENABLED: "true"
    volumes:
      - ./backend:/app
      - ./backend/ml/models:/app/ml/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

networks:
  default:
    name: iris-network
